  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Expose decoded asset blob URLs globally so the runtime script (loaded
    // below) can use locally-bundled libraries (e.g. React/ReactDOM) instead
    // of depending on a live network fetch to a CDN, which may be blocked in
    // sandboxed/offline preview contexts.
    window.__dcAssetBlobUrls = blobUrls;

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Native HTML parsing forces strict content models on <select>, <table>
    // and friends: an unrecognized child tag (like the <sc-for>/<sc-if> loop
    // markers used inside dropdown options) is silently dropped per the
    // HTML5 "in select"/"in table" insertion mode rules. The runtime script
    // loaded below already guards against this for template recompiles via
    // its own encodeCase() step, but that happens too late for the very
    // first parse performed right here — by the time compileTemplate() ever
    // sees this markup, a native parse has already stripped it once. Rename
    // those tags before this first parse so their contents survive intact;
    // the runtime unwraps them back to real <select>/<table> elements when
    // building the UI (it already understands this exact tag scheme).
    const RAW_WRAP_TAGS = ['select', 'table', 'tbody', 'thead', 'tfoot', 'tr', 'td', 'th', 'caption'];
    for (const tag of RAW_WRAP_TAGS) {
      template = template.replace(new RegExp('(</?)' + tag + '(?=[\\s>])', 'gi'), '$1sc-raw-' + tag);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

            <sc-if value=\"{{ c.hasTarget }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px; color:#5a5f68; margin-top:2px;\">{{ c.targetText }}<\/div><\/sc-if>\n                      <\/div>\n                      <div style=\"display:flex; gap:4px;\">\n                        <button onclick=\"{{ c.onEdit }}\" style=\"width:26px; height:26px; display:flex; align-items:center; justify-content:center; background:transparent; border:1px solid transparent; border-radius:6px; color:#6b7079; cursor:pointer;\" style-hover=\"border-color:#2d313a; color:#e7e9ee;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\/path><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\/path><\/svg><\/button>\n                        <button onclick=\"{{ c.onDelete }}\" style=\"width:26px; height:26px; display:flex; align-items:center; justify-content:center; background:transparent; border:1px solid transparent; border-radius:6px; color:#6b7079; cursor:pointer;\" style-hover=\"border-color:#3a2426; color:#f0616d;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 21 6\"><\/polyline><path d=\"M8 6V4h8v2\"><\/path><path d=\"M6 6l1 14h10l1-14\"><\/path><\/svg><\/button>\n                      <\/div>\n                    <\/div>\n                  <\/sc-for>\n                  <sc-if value=\"{{ grp.isEmptyReal }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:14px 16px; font-size:12px; color:#5a5f68;\">Gruppo vuoto — assegna categorie modificandole.<\/div><\/sc-if>\n                <\/div>\n              <\/div>\n            <\/sc-for>\n            <sc-if value=\"{{ expenseEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:24px; text-align:center; color:#6b7079; font-size:13px; background:#101216; border:1px solid #1c1f26; border-radius:12px;\">Nessuna categoria<\/div><\/sc-if>\n          <\/div>\n        <\/div>\n      <\/div>\n      <\/sc-if>\n\n    <\/div>\n  <\/main>\n\n  <!-- ============ MODALE ============ -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(0,0,0,0.6); animation:fpOverlay .18s ease;\" onclick=\"{{ onBackdrop }}\">\n      <div style=\"width:100%; max-width:460px; max-height:90vh; overflow-y:auto; background:#14161b; border:1px solid #262a32; border-radius:16px; box-shadow:0 24px 60px rgba(0,0,0,0.55); animation:fpFade .22s cubic-bezier(.2,.8,.3,1);\" data-modal-card=\"1\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid #21242b;\">\n          <h2 style=\"margin:0; font-size:16px; font-weight:700;\">{{ modalTitle }}<\/h2>\n          <button onclick=\"{{ onClose }}\" style=\"width:30px; height:30px; display:flex; align-items:center; justify-content:center; background:transparent; border:none; border-radius:8px; color:#6b7079; cursor:pointer; font-size:20px;\" style-hover=\"color:#e7e9ee;\">×<\/button>\n        <\/div>\n        <div style=\"padding:20px; display:flex; flex-direction:column; gap:15px;\">\n\n          <!-- ACCOUNT FORM -->\n          <sc-if value=\"{{ isAccountModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Nome\n              <input type=\"text\" value=\"{{ data.name }}\" onchange=\"{{ onField }}\" data-field=\"name\" placeholder=\"es. Conto Corrente\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            <\/label>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Banca \/ Istituto\n              <input type=\"text\" value=\"{{ data.bank }}\" onchange=\"{{ onField }}\" data-field=\"bank\" placeholder=\"es. Intesa Sanpaolo\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            <\/label>\n            <div style=\"display:flex; gap:12px;\">\n              <label style=\"flex:1; display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Tipo\n                <select value=\"{{ data.type }}\" onchange=\"{{ onField }}\" data-field=\"type\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n                  <sc-for list=\"{{ accountTypeOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\/option><\/sc-for>\n                <\/select>\n              <\/label>\n              <label style=\"flex:1; display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Saldo iniziale (€)\n                <input type=\"text\" inputmode=\"decimal\" value=\"{{ data.initialBalance }}\" onchange=\"{{ onField }}\" data-field=\"initialBalance\" placeholder=\"0,00\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px; font-family:'JetBrains Mono',monospace;\" style-focus=\"border-color:#5b8def;\">\n              <\/label>\n            <\/div>\n            <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 13px; background:#0c0d10; border:1px solid #23262d; border-radius:10px; cursor:pointer;\">\n              <span style=\"font-size:13px; color:#e7e9ee; font-weight:600;\">Conto nel budget<span style=\"display:block; font-size:11px; color:#6b7079; font-weight:500; margin-top:2px;\">Disattiva per conti di monitoraggio (investimenti, pensione)<\/span><\/span>\n              <input type=\"checkbox\" checked=\"{{ data.onBudget }}\" onchange=\"{{ onField }}\" data-field=\"onBudget\" style=\"width:18px; height:18px; accent-color:#3ecf8e; cursor:pointer; flex-shrink:0;\">\n            <\/label>\n          <\/sc-if>\n\n          <!-- TRANSACTION FORM -->\n          <sc-if value=\"{{ isTransactionModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; gap:8px; background:#0c0d10; border:1px solid #23262d; border-radius:10px; padding:4px;\">\n              <button onclick=\"{{ setTypeIncome }}\" style=\"{{ typeBtn.income }}\">Entrata<\/button>\n              <button onclick=\"{{ setTypeExpense }}\" style=\"{{ typeBtn.expense }}\">Uscita<\/button>\n              <button onclick=\"{{ setTypeTransfer }}\" style=\"{{ typeBtn.transfer }}\">Trasferimento<\/button>\n            <\/div>\n            <div style=\"display:flex; gap:12px;\">\n              <label style=\"flex:1; display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Data\n                <input type=\"date\" value=\"{{ data.date }}\" onchange=\"{{ onField }}\" data-field=\"date\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n              <\/label>\n              <label style=\"flex:1; display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Importo (€)\n                <input type=\"text\" inputmode=\"decimal\" value=\"{{ data.amount }}\" onchange=\"{{ onField }}\" data-field=\"amount\" placeholder=\"0,00\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px; font-family:'JetBrains Mono',monospace;\" style-focus=\"border-color:#5b8def;\">\n              <\/label>\n            <\/div>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Descrizione\n              <input type=\"text\" value=\"{{ data.description }}\" onchange=\"{{ onField }}\" data-field=\"description\" placeholder=\"es. Spesa Esselunga\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            <\/label>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">{{ accountFieldLabel }}\n              <select value=\"{{ data.accountId }}\" onchange=\"{{ onField }}\" data-field=\"accountId\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n                <sc-for list=\"{{ modalAccountOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\/option><\/sc-for>\n              <\/select>\n            <\/label>\n            <sc-if value=\"{{ isTransferModal }}\" hint-placeholder-val=\"{{ false }}\">\n              <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Conto di destinazione\n                <select value=\"{{ data.toAccountId }}\" onchange=\"{{ onField }}\" data-field=\"toAccountId\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n                  <sc-for list=\"{{ modalAccountOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\/option><\/sc-for>\n                <\/select>\n              <\/label>\n            <\/sc-if>\n            <sc-if value=\"{{ showCategoryField }}\" hint-placeholder-val=\"{{ true }}\">\n              <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Categoria\n                <select value=\"{{ data.categoryId }}\" onchange=\"{{ onField }}\" data-field=\"categoryId\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n                  <option value=\"\">— Nessuna —<\/option>\n                  <sc-for list=\"{{ modalCategoryOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\/option><\/sc-for>\n                <\/select>\n              <\/label>\n            <\/sc-if>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Note\n              <input type=\"text\" value=\"{{ data.notes }}\" onchange=\"{{ onField }}\" data-field=\"notes\" placeholder=\"Facoltative\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            <\/label>\n            <div>\n              <div style=\"font-size:12px; color:#9297a1; font-weight:600; margin-bottom:6px;\">Stato liquidazione<\/div>\n              <div style=\"display:flex; gap:8px; background:#0c0d10; border:1px solid #23262d; border-radius:10px; padding:4px;\">\n                <button onclick=\"{{ setClearedUncleared }}\" style=\"{{ clearedBtn.uncleared }}\">Non liquidato<\/button>\n                <button onclick=\"{{ setClearedCleared }}\" style=\"{{ clearedBtn.cleared }}\">Liquidato<\/button>\n                <button onclick=\"{{ setClearedReconciled }}\" style=\"{{ clearedBtn.reconciled }}\">Riconciliato<\/button>\n              <\/div>\n            <\/div>\n          <\/sc-if>\n\n          <!-- CATEGORY FORM -->\n          <sc-if value=\"{{ isCategoryModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Nome\n              <input type=\"text\" value=\"{{ data.name }}\" onchange=\"{{ onField }}\" data-field=\"name\" placeholder=\"es. Spesa alimentare\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            <\/label>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Tipo\n              <select value=\"{{ data.type }}\" onchange=\"{{ onField }}\" data-field=\"type\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n                <option value=\"Expense\">Uscita<\/option>\n                <option value=\"Income\">Entrata<\/option>\n              <\/select>\n            <\/label>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Gruppo\n              <input type=\"text\" list=\"fp-groups\" value=\"{{ data.group }}\" onchange=\"{{ onField }}\" data-field=\"group\" placeholder=\"es. Obblighi fissi\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n              <datalist id=\"fp-groups\"><sc-for list=\"{{ existingGroups }}\" as=\"g\" hint-placeholder-count=\"0\"><option value=\"{{ g }}\"><\/option><\/sc-for><\/datalist>\n            <\/label>\n            <sc-if value=\"{{ isExpenseCatModal }}\" hint-placeholder-val=\"{{ true }}\">\n              <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Obiettivo mensile (€)\n                <input type=\"text\" inputmode=\"decimal\" value=\"{{ data.target }}\" onchange=\"{{ onField }}\" data-field=\"target\" placeholder=\"Facoltativo—quanto vuoi assegnare ogni mese\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px; font-family:'JetBrains Mono',monospace;\" style-focus=\"border-color:#5b8def;\">\n              <\/label>\n            <\/sc-if>\n          <\/sc-if>\n\n          <!-- IMPORT FORM -->\n          <sc-if value=\"{{ isImportModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12.5px; color:#9297a1; line-height:1.6;\">Carica un file <b style=\"color:#e7e9ee;\">CSV<\/b> (separatore <span style=\"color:#5b8def; font-family:'JetBrains Mono',monospace;\">;<\/span>) oppure incolla i dati qui sotto. Il conto deve corrispondere per nome; le categorie mancanti vengono create.<\/div>\n            <div style=\"background:#0c0d10; border:1px solid #21242b; border-radius:9px; padding:10px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#6b7079; overflow-x:auto; white-space:nowrap;\">Data;Descrizione;Conto;Conto destinazione;Tipo;Categoria;Importo;Note;Stato<\/div>\n            <div style=\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\">\n              <label style=\"display:inline-flex; align-items:center; gap:7px; padding:9px 14px; background:#1c1f26; border:1px solid #262a32; border-radius:9px; color:#e7e9ee; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#23262d;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 16V4\"><\/path><polyline points=\"7 9 12 4 17 9\"><\/polyline><path d=\"M5 20h14\"><\/path><\/svg>\n                Scegli file\n                <input type=\"file\" accept=\".csv,text\/csv\" onchange=\"{{ onImportFile }}\" style=\"display:none;\">\n              <\/label>\n              <button onclick=\"{{ onDownloadTemplate }}\" style=\"background:none; border:none; color:#5b8def; font-size:12.5px; font-weight:600; cursor:pointer; padding:0;\">Scarica modello<\/button>\n              <sc-if value=\"{{ importHasFile }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px; color:#3ecf8e; font-weight:600;\">{{ importFileName }}<\/span><\/sc-if>\n            <\/div>\n            <textarea value=\"{{ data.text }}\" onchange=\"{{ onField }}\" data-field=\"text\" placeholder=\"01\/07\/2026;Spesa;Revolut;;Uscita;Spesa alimentare;42,50;;Non liquidato\" rows=\"5\" style=\"width:100%; resize:vertical; padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:12px; color:#e7e9ee; font-family:'JetBrains Mono',monospace; line-height:1.5;\" style-focus=\"border-color:#5b8def;\"><\/textarea>\n          <\/sc-if>\n          <!-- GROUP FORM -->\n          <sc-if value=\"{{ isGroupModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Nome del gruppo\n              <input type=\"text\" value=\"{{ data.name }}\" onchange=\"{{ onField }}\" data-field=\"name\" placeholder=\"es. Obblighi fissi\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            <\/label>\n            <div style=\"font-size:12px; color:#6b7079; line-height:1.5;\">I gruppi organizzano le categorie di uscita nel budget. Rinominando un gruppo, tutte le categorie collegate vengono aggiornate.<\/div>\n          <\/sc-if>\n\n        <\/div>\n        <div style=\"display:flex; gap:10px; justify-content:space-between; align-items:center; padding:16px 20px; border-top:1px solid #21242b;\">\n          <sc-if value=\"{{ canDelete }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ onModalDelete }}\" style=\"padding:9px 14px; background:transparent; border:1px solid #3a2426; border-radius:9px; color:#f0616d; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#f0616d; color:#fff; border-color:#f0616d;\">Elimina<\/button>\n          <\/sc-if>\n          <div style=\"display:flex; gap:10px; margin-left:auto;\">\n            <button onclick=\"{{ onClose }}\" style=\"padding:9px 16px; background:#1c1f26; border:1px solid #262a32; border-radius:9px; color:#e7e9ee; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#23262d;\">Annulla<\/button>\n            <button onclick=\"{{ onSave }}\" style=\"padding:9px 18px; background:#5b8def; border:none; border-radius:9px; color:#fff; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#6f9bf2;\">{{ saveLabel }}<\/button>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n<\/div>\n<\/x-dc>\n<script type=\"text\/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;startView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;budget&quot;,&quot;transactions&quot;,&quot;accounts&quot;,&quot;categories&quot;],&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Comportamento&quot;},&quot;confirmDeletes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Comportamento&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.store = this.createStore();\n    const s = this.store;\n    const startView = ['dashboard','budget','transactions','accounts','categories'].includes(this.props.startView) ? this.props.startView : 'dashboard';\n    const isMobile = (typeof window !== 'undefined') ? window.innerWidth < 860 : false;\n    this.state = {\n      view: startView,\n      month: '2026-07',\n      isMobile: isMobile,\n      drawerOpen: false,\n      collapsed: false,\n      filters: { from:'', to:'', accountId:'', categoryId:'', type:'' },\n      dash: { preset:'6m', accountId:'', groupId:'', categoryId:'' },\n      modal: { open:false, kind:null, mode:'create', data:{} },\n      accounts: s.all('Accounts'),\n      transactions: s.all('Transactions'),\n      categories: s.all('Categories'),\n      groups: s.all('Groups'),\n      budgets: s.all('Budgets'),\n    };\n    this.accountTypes = [\n      ['Current Account','Conto corrente'],['Card','Carta'],['Deposit','Deposito'],\n      ['Broker','Broker'],['Pension Fund','Fondo pensione'],['Cash','Contanti'],\n      ['Crypto','Crypto'],['Other','Altro']\n    ];\n    this.monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];\n    this.monthAbbrArr = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];\n  }\n\n  componentDidMount(){\n    this._onResize = () => {\n      const m = window.innerWidth < 860;\n      if (m !== this.state.isMobile) this.setState({ isMobile:m, drawerOpen:false });\n    };\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e) => { if (e.key === 'Escape' && this.state.modal.open) this.closeModal(); };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  \/* ---------- ABSTRACT DATA STORE (Sheets-like tables, swappable) ---------- *\/\n  createStore(){\n    const KEY = 'fp_mvp_store_v5';\n    const self = this;\n    const load = () => { try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e){} return null; };\n    let db = load() || self.seed();\n    const save = () => { try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e){} };\n    save();\n    const uid = (p) => p + '_' + Math.random().toString(36).slice(2,9);\n    const api = {\n      all: (sheet) => (db[sheet] || []).slice(),\n      get: (sheet, id) => (db[sheet] || []).find(r => r.id === id),\n      create: (sheet, obj) => { const row = Object.assign({}, obj, { id: obj.id || uid(sheet.toLowerCase()) }); db[sheet] = (db[sheet]||[]).concat([row]); save(); return row; },\n      update: (sheet, id, patch) => { db[sheet] = (db[sheet]||[]).map(r => r.id===id ? Object.assign({}, r, patch) : r); save(); return api.get(sheet,id); },\n      remove: (sheet, id) => { db[sheet] = (db[sheet]||[]).filter(r => r.id !== id); save(); },\n      upsertBudget: (month, categoryId, assigned) => {\n        const ex = (db.Budgets||[]).find(b => b.month===month && b.categoryId===categoryId);\n        if (ex) return api.update('Budgets', ex.id, { assigned });\n        return api.create('Budgets', { month, categoryId, assigned });\n      },\n      reset: () => { db = self.seed(); save(); }\n    };\n    return api;\n  }\n\n  seed(){\n    const A = [\n      { id:'acc_cc', name:'Conto Corrente', bank:'Intesa Sanpaolo', type:'Current Account', initialBalance:3200, onBudget:true },\n      { id:'acc_rev', name:'Revolut', bank:'Revolut', type:'Card', initialBalance:450, onBudget:true },\n      { id:'acc_dep', name:'Deposito Findomestic', bank:'Findomestic', type:'Deposit', initialBalance:8000, onBudget:true },\n      { id:'acc_cash', name:'Contanti', bank:'—', type:'Cash', initialBalance:120, onBudget:true },\n      { id:'acc_broker', name:'Broker Directa', bank:'Directa', type:'Broker', initialBalance:5400, onBudget:false },\n      { id:'acc_pens', name:'Fondo Pensione', bank:'Amundi', type:'Pension Fund', initialBalance:12500, onBudget:false },\n    ];\n    const C = [\n      { id:'cat_stip', name:'Stipendio', type:'Income', group:'Entrate', target:0 },\n      { id:'cat_extra', name:'Entrate extra', type:'Income', group:'Entrate', target:0 },\n      { id:'cat_rimb', name:'Rimborsi', type:'Income', group:'Entrate', target:0 },\n      { id:'cat_casa', name:'Casa e affitto', type:'Expense', group:'Obblighi fissi', target:850 },\n      { id:'cat_boll', name:'Bollette', type:'Expense', group:'Obblighi fissi', target:140 },\n      { id:'cat_alim', name:'Spesa alimentare', type:'Expense', group:'Spese quotidiane', target:350 },\n      { id:'cat_trasp', name:'Trasporti', type:'Expense', group:'Spese quotidiane', target:120 },\n      { id:'cat_rist', name:'Ristoranti', type:'Expense', group:'Qualità della vita', target:100 },\n      { id:'cat_svago', name:'Svago', type:'Expense', group:'Qualità della vita', target:80 },\n      { id:'cat_shop', name:'Shopping', type:'Expense', group:'Qualità della vita', target:100 },\n      { id:'cat_abb', name:'Abbonamenti', type:'Expense', group:'Abbonamenti & Salute', target:40 },\n      { id:'cat_salute', name:'Salute', type:'Expense', group:'Abbonamenti & Salute', target:60 },\n    ];\n    const T = [\n      { id:'t01', date:'2026-07-01', description:'Stipendio luglio', accountId:'acc_cc', type:'Income', categoryId:'cat_stip', amount:2600, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t02', date:'2026-07-01', description:'Affitto', accountId:'acc_cc', type:'Expense', categoryId:'cat_casa', amount:850, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t03', date:'2026-07-02', description:'Esselunga', accountId:'acc_rev', type:'Expense', categoryId:'cat_alim', amount:76.40, notes:'Spesa settimanale', cleared:'reconciled', reconciled:true },\n      { id:'t04', date:'2026-07-03', description:'Rimborso trasferta', accountId:'acc_cc', type:'Income', categoryId:'cat_rimb', amount:85, notes:'', cleared:'cleared', reconciled:false },\n      { id:'t05', date:'2026-07-04', description:'Benzina', accountId:'acc_cc', type:'Expense', categoryId:'cat_trasp', amount:55, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t06', date:'2026-07-05', description:'Bolletta Enel', accountId:'acc_cc', type:'Expense', categoryId:'cat_boll', amount:62.30, notes:'', cleared:'uncleared', reconciled:false },\n      { id:'t07', date:'2026-07-05', description:'Giroconto risparmio', accountId:'acc_cc', type:'Transfer', toAccountId:'acc_dep', categoryId:'', amount:500, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t08', date:'2026-07-06', description:'Cena fuori', accountId:'acc_rev', type:'Expense', categoryId:'cat_rist', amount:43.50, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t09', date:'2026-07-06', description:'PAC investimento', accountId:'acc_cc', type:'Transfer', toAccountId:'acc_broker', categoryId:'', amount:300, notes:'ETF World', cleared:'reconciled', reconciled:true },\n      { id:'t10', date:'2026-07-08', description:'Netflix', accountId:'acc_rev', type:'Expense', categoryId:'cat_abb', amount:12.99, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t11', date:'2026-07-09', description:'Spotify', accountId:'acc_rev', type:'Expense', categoryId:'cat_abb', amount:9.99, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t12', date:'2026-07-10', description:'Coop', accountId:'acc_rev', type:'Expense', categoryId:'cat_alim', amount:51.20, notes:'', cleared:'cleared', reconciled:false },\n      { id:'t13', date:'2026-07-12', description:'Farmacia', accountId:'acc_cash', type:'Expense', categoryId:'cat_salute', amount:18.50, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t14', date:'2026-07-14', description:'Cinema', accountId:'acc_cash', type:'Expense', categoryId:'cat_svago', amount:22, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t15', date:'2026-07-15', description:'Amazon', accountId:'acc_rev', type:'Expense', categoryId:'cat_shop', amount:34.90, notes:'Accessori', cleared:'cleared', reconciled:false },\n      { id:'t16', date:'2026-06-01', description:'Stipendio giugno', accountId:'acc_cc', type:'Income', categoryId:'cat_stip', amount:2600, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t17', date:'2026-06-28', description:'Esselunga', accountId:'acc_rev', type:'Expense', categoryId:'cat_alim', amount:82, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t18', date:'2026-06-15', description:'Bolletta gas', accountId:'acc_cc', type:'Expense', categoryId:'cat_boll', amount:71.10, notes:'', cleared:'reconciled', reconciled:true },\n    ];\n    const B = [\n      ['cat_alim',350],['cat_casa',850],['cat_trasp',120],['cat_boll',140],\n      ['cat_rist',100],['cat_svago',80],['cat_salute',60],['cat_abb',40],['cat_shop',100]\n    ].map((x,i) => ({ id:'b'+i, month:'2026-07', categoryId:x[0], assigned:x[1] }));\n    const S = [{ id:'settings', currency:'EUR', locale:'it-IT', theme:'dark' }];\n    const G = ['Obblighi fissi','Spese quotidiane','Qualità della vita','Abbonamenti & Salute'].map((n,i)=>({ id:'grp'+i, name:n }));\n    return { Accounts:A, Transactions:T, Categories:C, Groups:G, Budgets:B, Settings:S };\n  }\n\n  refresh(){\n    const s = this.store;\n    this.setState({ accounts:s.all('Accounts'), transactions:s.all('Transactions'), categories:s.all('Categories'), groups:s.all('Groups'), budgets:s.all('Budgets') });\n  }\n\n  \/* ---------- helpers ---------- *\/\n  fmtEur(n){ return new Intl.NumberFormat('it-IT',{ style:'currency', currency:'EUR' }).format(n || 0); }\n  fmtDate(iso){ if(!iso) return ''; const p = iso.split('-'); return p[2]+'\/'+p[1]+'\/'+p[0].slice(2); }\n  monthLabel(ym){ const p = ym.split('-'); return this.monthNames[parseInt(p[1],10)-1] + ' ' + p[0]; }\n  addMonth(ym, delta){ const p = ym.split('-'); let y = parseInt(p[0],10); let m = parseInt(p[1],10)-1+delta; y += Math.floor(m\/12); m = ((m%12)+12)%12; return y + '-' + String(m+1).padStart(2,'0'); }\n  parseNum(v){ if(typeof v === 'number') return v; return parseFloat(String(v||'').replace(\/\\s\/g,'').replace('.','').replace(',','.')) || parseFloat(String(v||'').replace(',','.')) || 0; }\n  typeLabelAcc(t){ const f = this.accountTypes.find(x => x[0]===t); return f ? f[1] : t; }\n\n  accountBalance(acc){\n    let b = acc.initialBalance || 0;\n    for (const t of this.state.transactions){\n      const amt = t.amount || 0;\n      if (t.type==='Income' && t.accountId===acc.id) b += amt;\n      else if (t.type==='Expense' && t.accountId===acc.id) b -= amt;\n      else if (t.type==='Transfer'){ if (t.accountId===acc.id) b -= amt; if (t.toAccountId===acc.id) b += amt; }\n    }\n    return b;\n  }\n\n  \/* ---------- navigation ---------- *\/\n  go(view){ this.setState({ view, drawerOpen:false }); }\n\n  \/* ---------- modal ---------- *\/\n  today(){ return '2026-07-15'; }\n  openModal(kind, mode, data){ this.setState({ modal:{ open:true, kind, mode, data: Object.assign({}, data) } }); }\n  closeModal(){ this.setState({ modal:{ open:false, kind:null, mode:'create', data:{} } }); }\n\n  newAccount(){ this.openModal('account','create',{ name:'', bank:'', type:'Current Account', initialBalance:'', onBudget:true }); }\n  editAccount(a){ this.openModal('account','edit',{ id:a.id, name:a.name, bank:a.bank, type:a.type, initialBalance:a.initialBalance, onBudget:a.onBudget!==false }); }\n  newTransaction(){\n    const firstAcc = this.state.accounts[0];\n    const firstExp = this.state.categories.find(c => c.type==='Expense');\n    this.openModal('transaction','create',{ type:'Expense', date:this.today(), description:'', accountId: firstAcc?firstAcc.id:'', toAccountId:'', categoryId: firstExp?firstExp.id:'', amount:'', notes:'', cleared:'uncleared' });\n  }\n  editTransaction(t){ this.openModal('transaction','edit', Object.assign({ toAccountId:'', cleared: t.cleared || (t.reconciled?'reconciled':'uncleared') }, t)); }\n  newCategory(type){ this.openModal('category','create',{ name:'', type: type||'Expense', group:'', target:'' }); }\n  editCategory(c){ this.openModal('category','edit',{ id:c.id, name:c.name, type:c.type, group:c.group||'', target: c.target? String(c.target).replace('.',','):'' }); }\n  newGroup(){ this.openModal('group','create',{ name:'' }); }\n  editGroup(name){ const g=this.state.groups.find(x=>x.name===name); this.openModal('group','edit',{ id:g?g.id:'', name:name, origName:name }); }\n  delGroup(name){\n    const cats=this.state.categories.filter(c=>(c.group||'')===name);\n    if(!this.confirmDel('Eliminare il gruppo \"'+name+'\"?'+(cats.length?(' Le '+cats.length+' categorie verranno spostate in \\u201cSenza gruppo\\u201d.'):''))) return;\n    const g=this.state.groups.find(x=>x.name===name); if(g) this.store.remove('Groups', g.id);\n    cats.forEach(c=>this.store.update('Categories', c.id, { group:'' }));\n    this.refresh();\n  }\n\n  onField(e){\n    const f = e.target.dataset.field;\n    const val = e.target.type==='checkbox' ? e.target.checked : e.target.value;\n    const data = Object.assign({}, this.state.modal.data); data[f] = val;\n    this.setState({ modal: Object.assign({}, this.state.modal, { data }) });\n  }\n  setTxnType(type){\n    const data = Object.assign({}, this.state.modal.data, { type });\n    if (type==='Transfer'){ data.categoryId=''; if(!data.toAccountId){ const other=this.state.accounts.find(a=>a.id!==data.accountId); data.toAccountId=other?other.id:''; } }\n    else if (!data.categoryId){ const c=this.state.categories.find(x=>x.type===(type==='Income'?'Income':'Expense')); data.categoryId=c?c.id:''; }\n    this.setState({ modal: Object.assign({}, this.state.modal, { data }) });\n  }\n\n  setCleared(v){ const data = Object.assign({}, this.state.modal.data, { cleared:v }); this.setState({ modal: Object.assign({}, this.state.modal, { data }) }); }\n\n  saveModal(){\n    const m = this.state.modal; const d = m.data; const s = this.store;\n    if (m.kind==='import'){ this.doImport(d.text); return; }\n    if (m.kind==='group'){\n      const name=(d.name||'').trim(); if(!name){ this.closeModal(); return; }\n      if(m.mode==='edit'){\n        if(d.id) this.store.update('Groups', d.id, { name });\n        this.state.categories.filter(c=>(c.group||'')===d.origName).forEach(c=>this.store.update('Categories', c.id, { group:name }));\n      } else if(!this.state.groups.some(g=>g.name===name)){\n        this.store.create('Groups', { name });\n      }\n      this.closeModal(); this.refresh(); return;\n    }\n    if (m.kind==='account'){\n      if (!String(d.name||'').trim()) return;\n      const payload = { name:d.name.trim(), bank:(d.bank||'').trim()||'—', type:d.type, initialBalance:this.parseNum(d.initialBalance), onBudget: d.onBudget!==false };\n      if (m.mode==='edit') s.update('Accounts', d.id, payload); else s.create('Accounts', payload);\n    } else if (m.kind==='transaction'){\n      const amt = this.parseNum(d.amount);\n      if (!amt || !d.accountId) return;\n      if (d.type==='Transfer' && (!d.toAccountId || d.toAccountId===d.accountId)) return;\n      const cleared = d.cleared || 'uncleared';\n      const payload = { date:d.date, description:(d.description||'').trim()||'(senza descrizione)', accountId:d.accountId, type:d.type, categoryId: d.type==='Transfer'?'':(d.categoryId||''), toAccountId: d.type==='Transfer'?d.toAccountId:'', amount:amt, notes:(d.notes||'').trim(), cleared:cleared, reconciled: cleared==='reconciled' };\n      if (m.mode==='edit') s.update('Transactions', d.id, payload); else s.create('Transactions', payload);\n    } else if (m.kind==='category'){\n      if (!String(d.name||'').trim()) return;\n      const grp=(d.group||'').trim();\n      if(grp && !this.state.groups.some(g=>g.name===grp)) this.store.create('Groups', { name:grp });\n      const payload = { name:d.name.trim(), type:d.type, group:grp, target:this.parseNum(d.target) };\n      if (m.mode==='edit') s.update('Categories', d.id, payload); else s.create('Categories', payload);\n    }\n    this.closeModal(); this.refresh();\n  }\n\n  confirmDel(msg){ return this.props.confirmDeletes===false ? true : window.confirm(msg); }\n  delAccount(a){ if(this.confirmDel('Eliminare il conto \"'+a.name+'\"? I movimenti collegati resteranno.')){ this.store.remove('Accounts',a.id); this.refresh(); } }\n  delTransaction(t){
