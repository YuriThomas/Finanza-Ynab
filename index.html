document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    // JS assets (React/ReactDOM/runtime) get their decoded source text kept
    // here too, keyed by uuid. Some WebKit/Safari versions do not reliably
    // fire the 'load' event for a dynamically created <script src="blob:...">
    // element, which would otherwise hang the sequential-load loop below
    // forever with no error. Inlining the source as textContent instead of
    // pointing src at a blob: URL sidesteps that entire class of bug.
    const jsTextByUuid = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (entry.mime === 'text/javascript' || entry.mime === 'application/javascript') {
          try { jsTextByUuid[uuid] = new TextDecoder('utf-8').decode(finalBytes); } catch (e) {}
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Expose decoded asset blob URLs globally so the runtime script (loaded
    // below) can use locally-bundled libraries (e.g. React/ReactDOM) instead
    // of depending on a live network fetch to a CDN, which may be blocked in
    // sandboxed/offline preview contexts.
    window.__dcAssetBlobUrls = blobUrls;
    // Also expose raw decoded source text for JS assets. Some webviews block
    // or silently fail to execute a dynamically created <script src="blob:...">
    // element; running the same source as a plain inline script (no src at
    // all) sidesteps that restriction entirely, so the runtime prefers this
    // over the blob: URL above whenever it's available.
    window.__dcAssetTextByUuid = jsTextByUuid;

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    // Mark which blob URLs correspond to our own bundled JS assets *before*
    // substituting uuids for URLs in the markup, so the script-recreation
    // loop further down can recognize and inline them by URL.
    const jsBlobUrlSet = new Set(Object.keys(jsTextByUuid).map(function(u) { return blobUrls[u]; }));
    const jsTextByBlobUrl = {};
    for (const uuid of Object.keys(jsTextByUuid)) jsTextByBlobUrl[blobUrls[uuid]] = jsTextByUuid[uuid];
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Native HTML parsing forces strict content models on <select>, <table>
    // and friends: an unrecognized child tag (like the <sc-for>/<sc-if> loop
    // markers used inside dropdown options) is silently dropped per the
    // HTML5 "in select"/"in table" insertion mode rules. The runtime script
    // loaded below already guards against this for template recompiles via
    // its own encodeCase() step, but that happens too late for the very
    // first parse performed right here — by the time compileTemplate() ever
    // sees this markup, a native parse has already stripped it once. Rename
    // those tags before this first parse so their contents survive intact;
    // the runtime unwraps them back to real <select>/<table> elements when
    // building the UI (it already understands this exact tag scheme).
    const RAW_WRAP_TAGS = ['select', 'table', 'tbody', 'thead', 'tfoot', 'tr', 'td', 'th', 'caption'];
    for (const tag of RAW_WRAP_TAGS) {
      template = template.replace(new RegExp('(</?)' + tag + '(?=[\\s>])', 'gi'), '$1sc-raw-' + tag);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      } else if (s.src && jsBlobUrlSet.has(s.src) && jsTextByBlobUrl[s.src] != null) {
        // Inline our own bundled JS (React/ReactDOM/runtime) directly instead
        // of loading it via a blob: src, so we never depend on that script's
        // 'load' event firing — see note above where jsTextByUuid is built.
        s.textContent = jsTextByBlobUrl[s.src];
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M4 18V9M9 18V5M14 18v-6M19 18v-9\"></path></svg>\n      </div>\n      <div style=\"line-height:1.1;\">\n        <div style=\"font-weight:700; font-size:14.5px; letter-spacing:-0.2px;\">Finanza</div>\n        <div style=\"font-size:11px; color:#6b7079; font-weight:500;\">Personale</div>\n      </div>\n    </div>\n\n    <nav style=\"display:flex; flex-direction:column; gap:2px;\">\n      <button onclick=\"{{ goDashboard }}\" style=\"{{ navStyle.dashboard }}\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"3\" width=\"8\" height=\"10\" rx=\"1.5\"></rect><rect x=\"13\" y=\"3\" width=\"8\" height=\"6\" rx=\"1.5\"></rect><rect x=\"3\" y=\"15\" width=\"8\" height=\"6\" rx=\"1.5\"></rect><rect x=\"13\" y=\"11\" width=\"8\" height=\"10\" rx=\"1.5\"></rect></svg>\n        <span>Dashboard</span>\n      </button>\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; flex-direction:column; gap:1px; margin:2px 0 6px 14px; padding-left:13px; border-left:1px solid #21242b;\">\n          <sc-for list=\"{{ dashSideItems }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ d.onClick }}\" style=\"{{ d.style }}\">{{ d.label }}</button>\n          </sc-for>\n        </div>\n      </sc-if>\n      <button onclick=\"{{ goBudget }}\" style=\"{{ navStyle.budget }}\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"8\"></circle><circle cx=\"12\" cy=\"12\" r=\"3\"></circle></svg>\n        <span>Budget</span>\n      </button>\n      <button onclick=\"{{ goTransactions }}\" style=\"{{ navStyle.transactions }}\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"></line><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"></line><line x1=\"4\" y1=\"17\" x2=\"13\" y2=\"17\"></line></svg>\n        <span>Movimenti</span>\n      </button>\n      <button onclick=\"{{ goAccounts }}\" style=\"{{ navStyle.accounts }}\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"3\" y=\"6\" width=\"18\" height=\"12\" rx=\"2\"></rect><line x1=\"3\" y1=\"10.5\" x2=\"21\" y2=\"10.5\"></line></svg>\n        <span>Conti</span>\n      </button>\n      <button onclick=\"{{ goCategories }}\" style=\"{{ navStyle.categories }}\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"4\" y=\"4\" width=\"7\" height=\"7\" rx=\"1.5\"></rect><rect x=\"13\" y=\"4\" width=\"7\" height=\"7\" rx=\"1.5\"></rect><rect x=\"4\" y=\"13\" width=\"7\" height=\"7\" rx=\"1.5\"></rect><rect x=\"13\" y=\"13\" width=\"7\" height=\"7\" rx=\"1.5\"></rect></svg>\n        <span>Categorie</span>\n      </button>\n    </nav>\n\n    <div style=\"margin-top:auto; padding-top:16px;\">\n      <div style=\"background:#131519; border:1px solid #21242b; border-radius:12px; padding:14px;\">\n        <div style=\"font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;\">Patrimonio netto</div>\n        <div style=\"{{ netWorthStyle }}\">{{ totalNetWorthText }}</div>\n        <div style=\"font-size:11.5px; color:#6b7079; margin-top:2px;\">{{ accountsCountText }}</div>\n      </div>\n      <button onclick=\"{{ onReset }}\" style=\"width:100%; margin-top:10px; padding:8px; background:transparent; border:1px solid #21242b; border-radius:9px; color:#6b7079; font-size:12px; font-weight:500; cursor:pointer;\" style-hover=\"border-color:#f0616d; color:#f0616d;\">Ripristina dati d'esempio</button>\n    </div>\n  </aside>\n\n  <main style=\"flex:1; min-width:0; display:flex; flex-direction:column; height:100vh; overflow:hidden;\">\n    <header style=\"display:flex; align-items:center; gap:14px; padding:18px 28px; border-bottom:1px solid #191c22; flex-shrink:0;\">\n      <button onclick=\"{{ onMenu }}\" title=\"{{ menuTitle }}\" style=\"width:36px; height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:#131519; border:1px solid #21242b; border-radius:9px; color:#e7e9ee; cursor:pointer;\" style-hover=\"border-color:#2d313a;\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"></line><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"></line><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"></line></svg>\n      </button>\n      <div style=\"flex:1; min-width:0;\">\n        <h1 style=\"margin:0; font-size:19px; font-weight:700; letter-spacing:-0.3px;\">{{ navTitle }}</h1>\n        <p style=\"margin:2px 0 0; font-size:12.5px; color:#6b7079;\">{{ navSubtitle }}</p>\n      </div>\n      <button onclick=\"{{ onPrimary }}\" style=\"display:inline-flex; align-items:center; gap:7px; padding:9px 15px; background:#5b8def; border:none; border-radius:9px; color:#fff; font-size:13px; font-weight:600; cursor:pointer; box-shadow:0 1px 8px rgba(91,141,239,0.3); white-space:nowrap;\" style-hover=\"background:#6f9bf2;\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"></line><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line></svg>\n        <span>{{ primaryLabel }}</span>\n      </button>\n    </header>\n\n    <div style=\"flex:1; overflow-y:auto; padding:28px;\">\n\n      <!-- ============ DASHBOARD ============ -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:1080px; margin:0 auto;\">\n\n        <!-- Filtro unico: conto + periodo, condiviso da KPI e dalle 4 schede sotto -->\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:20px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap;\">\n            <select value=\"{{ dashAccountId }}\" onchange=\"{{ onDashAccount }}\" style=\"padding:8px 11px; background:#131519; border:1px solid #21242b; border-radius:9px; color:#e7e9ee; font-size:13px; font-weight:500;\" style-focus=\"border-color:#5b8def;\">\n              <option value=\"\">Tutti i conti</option>\n              <sc-for list=\"{{ dashAccountOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}</option></sc-for>\n            </select>\n            <div style=\"display:flex; gap:2px; background:#131519; border:1px solid #21242b; border-radius:9px; padding:3px;\">\n              <sc-for list=\"{{ dashRangeBtns }}\" as=\"b\" hint-placeholder-count=\"5\"><button onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}</button></sc-for>\n            </div>\n          </div>\n          <div style=\"font-size:12.5px; color:#6b7079; font-weight:500;\">Periodo: <b style=\"color:#9297a1;\">{{ dashPeriodLabel }}</b></div>\n        </div>\n\n        <!-- KPI: sempre visibili, coerenti con il filtro sopra -->\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px;\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n            <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:16px 18px;\">\n              <div style=\"font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">{{ k.label }}</div>\n              <div style=\"{{ k.valStyle }}\">{{ k.value }}</div>\n              <div style=\"font-size:11.5px; color:#5a5f68; margin-top:3px;\">{{ k.sub }}</div>\n            </div>\n          </sc-for>\n        </div>\n\n        <!-- Scheda: Patrimonio netto -->\n        <sc-if value=\"{{ isDashNetWorth }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:16px;\">\n            <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n              <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap;\">\n                <div>\n                  <div style=\"font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">Patrimonio netto</div>\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:24px; margin-top:4px;\">{{ nwTrend.currentText }}</div>\n                </div>\n                <div style=\"text-align:right;\">\n                  <div style=\"font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">Variazione</div>\n                  <div style=\"{{ nwTrend.changeStyle }}\">{{ nwTrend.changeText }}</div>\n                </div>\n              </div>\n              <div style=\"position:relative; width:100%; height:200px; margin-top:14px;\">\n                <svg viewBox=\"0 0 100 60\" preserveAspectRatio=\"none\" style=\"width:100%; height:100%; display:block;\">\n                  <path d=\"{{ nwTrend.areaPath }}\" fill=\"rgba(91,141,239,0.14)\"></path>\n                  <path d=\"{{ nwTrend.linePath }}\" fill=\"none\" stroke=\"#5b8def\" stroke-width=\"2\" vector-effect=\"non-scaling-stroke\" stroke-linejoin=\"round\" stroke-linecap=\"round\"></path>\n                </svg>\n                <sc-for list=\"{{ nwTrend.dots }}\" as=\"d\" hint-placeholder-count=\"0\"><div style=\"{{ d.style }}\" title=\"{{ d.title }}\"></div></sc-for>\n              </div>\n              <div style=\"display:flex; justify-content:space-between; font-size:10.5px; color:#5a5f68; margin-top:8px;\">\n                <span>{{ nwTrend.startLabel }}</span><span>{{ nwTrend.endLabel }}</span>\n              </div>\n              <p style=\"margin:16px 0 0; font-size:12px; color:#5a5f68;\">Somma dei saldi di tutti i conti (attività) al netto degli eventuali saldi negativi (passività), mese per mese.</p>\n            </div>\n\n            <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n              <h3 style=\"margin:0 0 14px; font-size:14px; font-weight:700;\">Composizione attuale</h3>\n              <sc-if value=\"{{ allocHasData }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:36px; text-align:center; color:#6b7079;\">Nessun saldo positivo da mostrare.</div></sc-if>\n              <div style=\"display:flex; align-items:center; gap:20px; flex-wrap:wrap;\">\n                <div style=\"position:relative; width:132px; height:132px; flex-shrink:0;\">\n                  <svg viewBox=\"0 0 42 42\" style=\"width:132px; height:132px; transform:rotate(-90deg);\">\n                    <circle cx=\"21\" cy=\"21\" r=\"15.915\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"></circle>\n                    <sc-for list=\"{{ allocSegs }}\" as=\"s\" hint-placeholder-count=\"0\"><circle cx=\"21\" cy=\"21\" r=\"15.915\" fill=\"none\" stroke=\"{{ s.color }}\" stroke-width=\"5\" stroke-dasharray=\"{{ s.dash }}\" stroke-dashoffset=\"{{ s.offset }}\"></circle></sc-for>\n                  </svg>\n                  <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;\">\n                    <div style=\"font-size:9.5px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">Totale</div>\n                    <div style=\"font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px;\">{{ allocTotalText }}</div>\n                  </div>\n                </div>\n                <div style=\"flex:1; min-width:150px; display:flex; flex-direction:column; gap:9px;\">\n                  <sc-for list=\"{{ allocSegs }}\" as=\"s\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex; align-items:center; gap:9px;\">\n                      <span style=\"{{ s.dotStyle }}\"></span>\n                      <span style=\"flex:1; font-size:12.5px; color:#c8ccd2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ s.label }}</span>\n                      <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#9297a1;\">{{ s.valueText }}</span>\n                      <span style=\"font-size:11px; color:#5a5f68; width:34px; text-align:right;\">{{ s.pctText }}</span>\n                    </div>\n                  </sc-for>\n                </div>\n              </div>\n            </div>\n          </div>\n        </sc-if>\n\n        <!-- Scheda: Spese -->\n        <sc-if value=\"{{ isDashSpending }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:6px;\">\n              <h3 style=\"margin:0; font-size:14px; font-weight:700;\">Spese per categoria</h3>\n              <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap;\">\n                <select value=\"{{ dashGroupId }}\" onchange=\"{{ onDashGroup }}\" style=\"padding:6px 9px; background:#131519; border:1px solid #21242b; border-radius:8px; color:#e7e9ee; font-size:12px; font-weight:500;\" style-focus=\"border-color:#5b8def;\">\n                  <option value=\"\">Tutti i gruppi</option>\n                  <sc-for list=\"{{ dashGroupOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}</option></sc-for>\n                </select>\n                <select value=\"{{ dashCategoryId }}\" onchange=\"{{ onDashCategory }}\" style=\"padding:6px 9px; background:#131519; border:1px solid #21242b; border-radius:8px; color:#e7e9ee; font-size:12px; font-weight:500;\" style-focus=\"border-color:#5b8def;\">\n                  <option value=\"\">Tutte le categorie</option>\n                  <sc-for list=\"{{ dashCategoryOptions }}\" as=\"opt\" hint-placeholder-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}</option></sc-for>\n                </select>\n                <sc-if value=\"{{ dashFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button onclick=\"{{ clearDashFilter }}\" style=\"display:inline-flex; align-items:center; gap:6px; padding:6px 10px; background:rgba(91,141,239,0.12); border:1px solid rgba(91,141,239,0.35); border-radius:8px; color:#8fb4f5; font-size:11.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:rgba(91,141,239,0.2);\">{{ dashFilterLabel }} ×</button>\n                </sc-if>\n              </div>\n            </div>\n            <div style=\"font-size:12.5px; color:#9297a1; margin-bottom:16px;\">Totale <b style=\"font-family:'JetBrains Mono',monospace; color:#e7e9ee;\">{{ spendTotalText }}</b></div>\n            <sc-if value=\"{{ spendEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:40px; text-align:center; color:#6b7079;\">Nessuna spesa nel periodo selezionato.</div></sc-if>\n            <div style=\"display:flex; align-items:flex-start; gap:26px; flex-wrap:wrap;\">\n              <div style=\"position:relative; width:150px; height:150px; flex-shrink:0;\">\n                <svg viewBox=\"0 0 42 42\" style=\"width:150px; height:150px; transform:rotate(-90deg);\">\n                  <circle cx=\"21\" cy=\"21\" r=\"15.915\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"></circle>\n                  <sc-for list=\"{{ spendSegs }}\" as=\"s\" hint-placeholder-count=\"0\"><circle cx=\"21\" cy=\"21\" r=\"15.915\" fill=\"none\" stroke=\"{{ s.color }}\" stroke-width=\"5\" stroke-dasharray=\"{{ s.dash }}\" stroke-dashoffset=\"{{ s.offset }}\"></circle></sc-for>\n                </svg>\n              </div>\n              <div style=\"flex:1; min-width:230px; display:flex; flex-direction:column; gap:2px;\">\n                <sc-for list=\"{{ spendCats }}\" as=\"c\" hint-placeholder-count=\"6\">\n                  <div onclick=\"{{ c.onClick }}\" style=\"display:grid; grid-template-columns:16px 1fr 90px 44px; gap:10px; align-items:center; padding:9px 0; cursor:pointer; border-bottom:1px solid #16181d;\" style-hover=\"opacity:0.82;\">\n                    <span style=\"{{ c.dotStyle }}\"></span>\n                    <span style=\"font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ c.name }}</span>\n                    <span style=\"text-align:right; font-family:'JetBrains Mono',monospace; font-size:12.5px;\">{{ c.amountText }}</span>\n                    <span style=\"text-align:right; font-size:11px; color:#5a5f68;\">{{ c.pctText }}</span>\n                  </div>\n                </sc-for>\n              </div>\n            </div>\n          </div>\n        </sc-if>\n\n        <!-- Scheda: Entrate vs Uscite -->\n        <sc-if value=\"{{ isDashIncomeExpense }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:20px;\">\n              <sc-for list=\"{{ ieSummary }}\" as=\"k\" hint-placeholder-count=\"4\">\n                <div>\n                  <div style=\"font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">{{ k.label }}</div>\n                  <div style=\"{{ k.valStyle }}\">{{ k.value }}</div>\n                </div>\n              </sc-for>\n            </div>\n            <div style=\"display:flex; align-items:center; gap:14px; font-size:11.5px; color:#9297a1; margin-bottom:14px;\">\n              <span style=\"display:inline-flex; align-items:center; gap:5px;\"><span style=\"width:9px; height:9px; border-radius:2px; background:#3ecf8e;\"></span>Entrate</span>\n              <span style=\"display:inline-flex; align-items:center; gap:5px;\"><span style=\"width:9px; height:9px; border-radius:2px; background:#f0616d;\"></span>Uscite</span>\n            </div>\n            <div style=\"display:flex; align-items:flex-end; gap:8px; overflow-x:auto; padding-bottom:4px;\">\n              <sc-for list=\"{{ ieBars }}\" as=\"b\" hint-placeholder-count=\"6\">\n                <div onclick=\"{{ b.onClick }}\" title=\"{{ b.title }}\" style=\"flex:1; min-width:40px; display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer;\" style-hover=\"opacity:0.82;\">\n                  <div style=\"width:100%; height:180px; display:flex; align-items:flex-end; justify-content:center; gap:3px;\">\n                    <div style=\"{{ b.incomeStyle }}\"></div>\n                    <div style=\"{{ b.expenseStyle }}\"></div>\n                  </div>\n                  <div style=\"font-size:10.5px; color:#6b7079; white-space:nowrap;\">{{ b.label }}</div>\n                  <div style=\"{{ b.netStyle }}\">{{ b.netText }}</div>\n                </div>\n              </sc-for>\n            </div>\n            <div style=\"font-size:11px; color:#5a5f68; margin-top:12px;\">Clicca un mese per aprire i movimenti corrispondenti · il numero sotto ogni colonna è il risparmio netto del mese</div>\n          </div>\n        </sc-if>\n\n        <!-- Scheda: Entrate per fonte -->\n        <sc-if value=\"{{ isDashIncomeBreakdown }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n            <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;\">\n              <h3 style=\"margin:0; font-size:14px; font-weight:700;\">Entrate per fonte</h3>\n              <span style=\"font-size:12.5px; color:#9297a1;\">Totale <b style=\"font-family:'JetBrains Mono',monospace; color:#e7e9ee;\">{{ incomeTotalText }}</b></span>\n            </div>\n            <sc-if value=\"{{ incomeBreakdownEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:40px; text-align:center; color:#6b7079;\">Nessuna entrata nel periodo selezionato.</div></sc-if>\n            <div style=\"display:flex; align-items:flex-start; gap:26px; flex-wrap:wrap;\">\n              <div style=\"position:relative; width:150px; height:150px; flex-shrink:0;\">\n                <svg viewBox=\"0 0 42 42\" style=\"width:150px; height:150px; transform:rotate(-90deg);\">\n                  <circle cx=\"21\" cy=\"21\" r=\"15.915\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"></circle>\n                  <sc-for list=\"{{ incomeSegs }}\" as=\"s\" hint-placeholder-count=\"0\"><circle cx=\"21\" cy=\"21\" r=\"15.915\" fill=\"none\" stroke=\"{{ s.color }}\" stroke-width=\"5\" stroke-dasharray=\"{{ s.dash }}\" stroke-dashoffset=\"{{ s.offset }}\"></circle></sc-for>\n                </svg>\n              </div>\n              <div style=\"flex:1; min-width:230px; display:flex; flex-direction:column; gap:2px;\">\n                <sc-for list=\"{{ incomeRows }}\" as=\"c\" hint-placeholder-count=\"6\">\n                  <div onclick=\"{{ c.onClick }}\" style=\"display:grid; grid-template-columns:16px 1fr 90px 44px; gap:10px; align-items:center; padding:9px 0; cursor:pointer; border-bottom:1px solid #16181d;\" style-hover=\"opacity:0.82;\">\n                    <span style=\"{{ c.dotStyle }}\"></span>\n                    <span style=\"font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ c.name }}</span>\n                    <span style=\"text-align:right; font-family:'JetBrains Mono',monospace; font-size:12.5px;\">{{ c.amountText }}</span>\n                    <span style=\"text-align:right; font-size:11px; color:#5a5f68;\">{{ c.pctText }}</span>\n                  </div>\n                </sc-for>\n              </div>\n            </div>\n          </div>\n        </sc-if>\n\n        <!-- Scheda: Risparmio & Età del denaro -->\n        <sc-if value=\"{{ isDashSavings }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n              <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px;\">\n                <sc-for list=\"{{ savSummary }}\" as=\"k\" hint-placeholder-count=\"4\">\n                  <div>\n                    <div style=\"font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">{{ k.label }}</div>\n                    <div style=\"{{ k.valStyle }}\">{{ k.value }}</div>\n                  </div>\n                </sc-for>\n              </div>\n            </div>\n            <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; padding:20px;\">\n              <h3 style=\"margin:0 0 14px; font-size:14px; font-weight:700;\">Tasso di risparmio mensile</h3>\n              <sc-if value=\"{{ savEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:40px; text-align:center; color:#6b7079;\">Nessun dato nel periodo selezionato.</div></sc-if>\n              <div style=\"display:flex; flex-direction:column; gap:2px;\">\n                <sc-for list=\"{{ savRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n                  <div onclick=\"{{ r.onClick }}\" style=\"display:grid; grid-template-columns:48px 1fr 54px 92px; gap:12px; align-items:center; padding:8px 0; cursor:pointer; border-bottom:1px solid #16181d;\" style-hover=\"opacity:0.82;\">\n                    <span style=\"font-size:11.5px; color:#9297a1;\">{{ r.label }}</span>\n                    <div style=\"height:8px; background:#16181d; border-radius:4px; overflow:hidden;\"><div style=\"{{ r.barStyle }}\"></div></div>\n                    <span style=\"{{ r.rateStyle }}\">{{ r.rateText }}</span>\n                    <span style=\"text-align:right; font-family:'JetBrains Mono',monospace; font-size:12px; color:#9297a1;\">{{ r.netText }}</span>\n                  </div>\n                </sc-for>\n              </div>\n              <p style=\"margin:14px 0 0; font-size:11px; color:#5a5f68;\">Tasso di risparmio = (entrate − uscite) / entrate del mese. Clicca una riga per aprire i movimenti di quel mese.</p>\n            </div>\n          </div>\n        </sc-if>\n\n      </div>\n      </sc-if>\n\n      <!-- ============ BUDGET ============ -->\n      <sc-if value=\"{{ isBudget }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"max-width:940px; margin:0 auto;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px;\">\n          <div style=\"display:flex; align-items:center; gap:6px;\">\n            <button onclick=\"{{ onPrevMonth }}\" style=\"width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#131519; border:1px solid #21242b; border-radius:9px; color:#e7e9ee; cursor:pointer;\" style-hover=\"border-color:#2d313a;\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"15 18 9 12 15 6\"></polyline></svg>\n            </button>\n            <div style=\"min-width:150px; text-align:center; font-weight:600; font-size:15px;\">{{ monthLabel }}</div>\n            <button onclick=\"{{ onNextMonth }}\" style=\"width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#131519; border:1px solid #21242b; border-radius:9px; color:#e7e9ee; cursor:pointer;\" style-hover=\"border-color:#2d313a;\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><polyline points=\"9 18 15 12 9 6\"></polyline></svg>\n            </button>\n          </div>\n          <div style=\"{{ readyCardStyle }}\">\n            <div style=\"font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; opacity:0.85;\">{{ readyLabel }}</div>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-weight:600; font-size:20px; margin-top:1px;\">{{ readyText }}</div>\n          </div>\n        </div>\n\n        <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:1fr 120px 120px 120px; gap:8px; padding:12px 18px; border-bottom:1px solid #1c1f26; font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">\n            <div>Categoria</div>\n            <div style=\"text-align:right;\">Assegnato</div>\n            <div style=\"text-align:right;\">Speso</div>\n            <div style=\"text-align:right;\">Disponibile</div>\n          </div>\n          <sc-for list=\"{{ budgetGroups }}\" as=\"grp\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid; grid-template-columns:1fr 120px; gap:8px; align-items:center; padding:11px 18px; background:#0e1013; border-bottom:1px solid #1c1f26;\">\n              <div style=\"font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#8a8f98;\">{{ grp.name }}</div>\n              <div style=\"text-align:right; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7079;\">{{ grp.assignedText }}</div>\n            </div>\n            <sc-for list=\"{{ grp.rows }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"display:grid; grid-template-columns:1fr 120px 120px 120px; gap:8px; align-items:center; padding:13px 18px; border-bottom:1px solid #16181d;\">\n                <div style=\"min-width:0;\">\n                  <div style=\"font-weight:600; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ row.name }}</div>\n                  <sc-if value=\"{{ row.hasHint }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ row.hintStyle }}\">{{ row.hint }}</div></sc-if>\n                  <div style=\"height:5px; margin-top:7px; background:#1c1f26; border-radius:4px; overflow:hidden;\">\n                    <div style=\"{{ row.barStyle }}\"></div>\n                  </div>\n                </div>\n                <div style=\"display:flex; justify-content:flex-end;\">\n                  <input type=\"text\" inputmode=\"decimal\" value=\"{{ row.assignedValue }}\" onchange=\"{{ row.onAssign }}\" style=\"width:100px; text-align:right; padding:7px 10px; background:#0c0d10; border:1px solid #23262d; border-radius:8px; color:#e7e9ee; font-family:'JetBrains Mono',monospace; font-size:13px;\" style-focus=\"border-color:#5b8def;\">\n                </div>\n                <div style=\"text-align:right; font-family:'JetBrains Mono',monospace; font-size:13px; color:#9297a1;\">{{ row.spentText }}</div>\n                <div style=\"text-align:right;\"><span style=\"{{ row.availStyle }}\">{{ row.availText }}</span></div>\n              </div>\n            </sc-for>\n          </sc-for>\n          <sc-if value=\"{{ budgetEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:44px 18px; text-align:center; color:#6b7079;\">Nessuna categoria di uscita. Creane una nella sezione Categorie.</div>\n          </sc-if>\n        </div>\n        <p style=\"margin:14px 2px 0; font-size:12px; color er-count=\"0\"><option value=\"{{ opt.value }}\">{{ opt.label }}</option></sc-for>\n            </select>\n          </label>\n          <label style=\"display:flex; flex-direction:column; gap:5px; font-size:11px; color:#6b7079; font-weight:600;\">Tipo\n            <select value=\"{{ filters.type }}\" onchange=\"{{ onFilter }}\" data-filter=\"type\" style=\"padding:8px 10px; background:#131519; border:1px solid #21242b; border-radius:9px; color:#e7e9ee; font-size:13px; font-weight:500; min-width:130px;\" style-focus=\"border-color:#5b8def;\">\n              <option value=\"\">Tutti</option>\n              <option value=\"Income\">Entrata</option>\n              <option value=\"Expense\">Uscita</option>\n              <option value=\"Transfer\">Trasferimento</option>\n            </select>\n          </label>\n          <sc-if value=\"{{ hasFilters }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ clearFilters }}\" style=\"padding:8px 12px; background:transparent; border:1px solid #21242b; border-radius:9px; color:#9297a1; font-size:12.5px; font-weight:500; cursor:pointer; height:35px;\" style-hover=\"border-color:#2d313a; color:#e7e9ee;\">Azzera filtri</button>\n          </sc-if>\n        </div>\n\n        <div style=\"background:#101216; border:1px solid #1c1f26; border-radius:14px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:96px 1fr 150px 160px 130px 78px; gap:10px; padding:12px 18px; border-bottom:1px solid #1c1f26; font-size:11px; color:#6b7079; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;\">\n            <div>Data</div><div>Descrizione</div><div>Categoria</div><div>Conto</div><div style=\"text-align:right;\">Importo</div><div></div>\n          </div>\n          <sc-for list=\"{{ txnRows }}\" as=\"t\" hint-placeholder-count=\"8\">\n            <div style=\"display:grid; grid-template-columns:96px 1fr 150px 160px 130px 78px; gap:10px; align-items:center; padding:13px 18px; border " style-focus=\"border-color:#5b8def;\">\n              </label>\n            </div>\n            <label style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 13px; background:#0c0d10; border:1px solid #23262d; border-radius:10px; cursor:pointer;\">\n              <span style=\"font-size:13px; color:#e7e9ee; font-weight:600;\">Conto nel budget<span style=\"display:block; font-size:11px; color:#6b7079; font-weight:500; margin-top:2px;\">Disattiva per conti di monitoraggio (investimenti, pensione)</span></span>\n              <input type=\"checkbox\" checked=\"{{ data.onBudget }}\" onchange=\"{{ onField }}\" data-field=\"onBudget\" style=\"width:18px; height:18px; accent-color:#3ecf8e; cursor:pointer; flex-shrink:0;\">\n            </label>\n          </sc-if>\n\n          <!-- TRANSACTION FORM -->\n          <sc-if value=\"{{ isTransactionModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; gap:8px; background:#0c0d10; border:1px solid #23262d; border-radius:10px; padding:4px;\">\n              <button onclick=\"{{ setTypeIncome }}\" style=\"{{ typeBtn.income }}\">Entrata</button>\n              <button onclick=\"{{ setTypeExpense }}\" style=\"{{ typeBtn.expense }}\">Uscita</button>\n              <button onclick=\"{{ setTypeTransfer }}\" style=\"{{ typeBtn.transfer }}\">Trasferimento</button>\n            </div>\n            <div style=\"display:flex; gap:12px;\">\n              <label style=\"flex:1; display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Data\n                <input type=\"date\" value=\"{{ data.date }}\" onchange=\"{{ onField }}\" data-field=\"date\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n              </label>\n              <label style=\"flex:1; display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a         <button onclick=\"{{ setClearedReconciled }}\" style=\"{{ clearedBtn.reconciled }}\">Riconciliato</button>\n              </div>\n            </div>\n          </sc-if>\n\n          <!-- CATEGORY FORM -->\n          <sc-if value=\"{{ isCategoryModal }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Nome\n              <input type=\"text\" value=\"{{ data.name }}\" onchange=\"{{ onField }}\" data-field=\"name\" placeholder=\"es. Spesa alimentare\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n            </label>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Tipo\n              <select value=\"{{ data.type }}\" onchange=\"{{ onField }}\" data-field=\"type\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n                <option value=\"Expense\">Uscita</option>\n                <option value=\"Income\">Entrata</option>\n              </select>\n            </label>\n            <label style=\"display:flex; flex-direction:column; gap:6px; font-size:12px; color:#9297a1; font-weight:600;\">Gruppo\n              <input type=\"text\" list=\"fp-groups\" value=\"{{ data.group }}\" onchange=\"{{ onField }}\" data-field=\"group\" placeholder=\"es. Obblighi fissi\" style=\"padding:10px 12px; background:#0c0d10; border:1px solid #23262d; border-radius:9px; font-size:14px;\" style-focus=\"border-color:#5b8def;\">\n              <datalist id=\"fp-groups\"><sc-for list=\"{{ existingGroups }}\" as=\"g\" hint-placeholder-count=\"0\"><option value=\"{{ g }}\"></option></sc-for></datalist>\n            </label>\n            <sc-if value=\"{{ isExpenseCatModal }}\" hint-placeholder-va ding:16px 20px; border-top:1px solid #21242b;\">\n          <sc-if value=\"{{ canDelete }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ onModalDelete }}\" style=\"padding:9px 14px; background:transparent; border:1px solid #3a2426; border-radius:9px; color:#f0616d; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#f0616d; color:#fff; border-color:#f0616d;\">Elimina</button>\n          </sc-if>\n          <div style=\"display:flex; gap:10px; margin-left:auto;\">\n            <button onclick=\"{{ onClose }}\" style=\"padding:9px 16px; background:#1c1f26; border:1px solid #262a32; border-radius:9px; color:#e7e9ee; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#23262d;\">Annulla</button>\n            <button onclick=\"{{ onSave }}\" style=\"padding:9px 18px; background:#5b8def; border:none; border-radius:9px; color:#fff; font-size:13px; font-weight:600; cursor:pointer;\" style-hover=\"background:#6f9bf2;\">{{ saveLabel }}</button>\n          </div>\n        </div>\n      </div>\n    </div>\n  </sc-if>\n\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:760},&quot;startView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;budget&quot;,&quot;transactions&quot;,&quot;accounts&quot;,&quot;categories&quot;],&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Comportamento&quot;},&quot;confirmDeletes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Comportamento&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.store = this.createStore();\n    const s = this.store;\n    const startView = ['dashboard','budget','transactions','accounts','categories'].includes(this.props.startView) ? this.props.startView : 'dashboard';\n    const isMobile = (typeof window !== 'undefined') ? window.innerWidth < 860 : false;\n    this.state = {\n      view: startView,\n      month: '2026-07',\n      isMobile: isMobile,\n      drawerOpen: false,\n      collapsed: false,\n      filters: { from:'', to:'', accountId:'', categoryId:'', type:'' },\n      dash: { tab:'networth', range:'6m', accountId:'', groupId:'', categoryId:'' },\n      modal: { open:false, kind:null, mode:'create', data:{} },\n      accounts: s.all('Accounts'),\n      transactions: s.all('Transactions'),\n      categories: s.all('Categories'),\n      groups: s.all('Groups'),\n      budgets: s.all('Budgets'),\n    };\n    this.accountTypes = [\n      ['Current Account','Conto corrente'],['Card','Carta'],['Deposit','Deposito'],\n      ['Broker','Broker'],['Pension Fund','Fondo pensione'],['Cash','Contanti'],\n      ['Crypto','Crypto'],['Other','Altro']\n    ];\n    this.monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];\n    this.monthAbbrArr = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];\n  }\n\n  componentDidMount(){\n    this._onResize = () => {\n      const m = window.innerWidth < 860;\n      if (m !== this.state.isMobile) this.setState({ isMobile:m, drawerOpen:false });\n    };\n    window.addEventListener('resize', this._onResize);\n    this._onKey = (e) => { if (e.key === 'Escape' && this.state.modal.open) this.closeModal(); };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n    window.removeEventListener('keydown', this._onKey);\n  }\n\n  /* ---------- ABSTRACT DATA STORE (Sheets-like tables, swappable) ---------- */\n  createStore(){\n    const KEY = 'fp_mvp_store_v5';\n    const self = this;\n    const load = () => { try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e){} return null; };\n    let db = load() || self.seed();\n    const save = () => { try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e){} };\n    save();\n    const uid = (p) => p + '_' + Math.random().toString(36).slice(2,9);\n    const api = {\n      all: (sheet) => (db[sheet] || []).slice(),\n      get: (sheet, id) => (db[sheet] || []).find(r => r.id === id),\n      create: (sheet, obj) => { const row = Object.assign({}, obj, { id: obj.id || uid(sheet.toLowerCase()) }); db[sheet] = (db[sheet]||[]).concat([row]); save(); return row; },\n      update: (sheet, id, patch) => { db[sheet] = (db[sheet]||[]).map(r => r.id===id ? Object.assign({}, r, patch) : r); save(); return api.get(sheet,id); },\n      remove: (sheet, id) => { db[sheet] = (db[sheet]||[]).filter(r => r.id !== id); save(); },\n      upsertBudget: (month, categoryId, assigned) => {\n        const ex = (db.Budgets||[]).find(b => b.month===month && b.categoryId===categoryId);\n        if (ex) return api.update('Budgets', ex.id, { assigned });\n        return api.create('Budgets', { month, categoryId, assigned });\n      },\n      reset: () => { db = self.seed(); save(); }\n    };\n    return api;\n  }\n\n  seed(){\n    const A = [\n      { id:'acc_cc', name:'Conto Corrente', bank:'Intesa Sanpaolo', type:'Current Account', initialBalance:3200, onBudget:true },\n      { id:'acc_rev', name:'Revolut', bank:'Revolut', type:'Card', initialBalance:450, onBudget:true },\n      { id:'acc_dep', name:'Deposito Findomestic', bank:'Findomestic', type:'Deposit', initialBalance:8000, onBudget:true },\n      { id:'acc_cash', name:'Contanti', bank:'—', type:'Cash', initialBalance:120, onBudget:true },\n      { id:'acc_broker', name:'Broker Directa', bank:'Directa', type:'Broker', initialBalance:5400, onBudget:false },\n      { id:'acc_pens', name:'Fondo Pensione', bank:'Amundi', type:'Pension Fund', initialBalance:12500, onBudget:false },\n    ];\n    const C = [\n      { id:'cat_ ccountId:'acc_cc', type:'Expense', categoryId:'cat_trasp', amount:55, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t06', date:'2026-07-05', description:'Bolletta Enel', accountId:'acc_cc', type:'Expense', categoryId:'cat_boll', amount:62.30, notes:'', cleared:'uncleared', reconciled:false },\n      { id:'t07', date:'2026-07-05', description:'Giroconto risparmio', accountId:'acc_cc', type:'Transfer', toAccountId:'acc_dep', categoryId:'', amount:500, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t08', date:'2026-07-06', description:'Cena fuori', accountId:'acc_rev', type:'Expense', categoryId:'cat_rist', amount:43.50, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t09', date:'2026-07-06', description:'PAC investimento', accountId:'acc_cc', type:'Transfer', toAccountId:'acc_broker', categoryId:'', amount:300, notes:'ETF World', cleared:'reconciled', reconciled:true },\n      { id:'t10', date:'2026-07-08', description:'Netflix', accountId:'acc_rev', type:'Expense', categoryId:'cat_abb', amount:12.99, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t11', date:'2026-07-09', description:'Spotify', accountId:'acc_rev', type:'Expense', categoryId:'cat_abb', amount:9.99, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t12', date:'2026-07-10', description:'Coop', accountId:'acc_rev', type:'Expense', categoryId:'cat_alim', amount:51.20, notes:'', cleared:'cleared', reconciled:false },\n      { id:'t13', date:'2026-07-12', description:'Farmacia', accountId:'acc_cash', type:'Expense', categoryId:'cat_salute', amount:18.50, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t14', date:'2026-07-14', description:'Cinema', accountId:'acc_cash', type:'Expense', categoryId:'cat_svago', amount:22, notes:'', cleared:'reconciled', reconciled:true },\n      { id:'t15', date:'2026-07-15', description:'Amazon', accountId:'acc_rev', type:'Expense', categoryId:'cat_shop', amount:34.90, notes:'Acc
